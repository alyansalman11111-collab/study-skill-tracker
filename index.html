<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Study Skill Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>📚 Study Skill Tracker</h1>
        
        <div id="stats">
        <div id="totalTasks">Total: 0</div>
        <div id="completedTasks">Done: 0</div>
        <div id="remainingTasks">Left: 0</div>
        </div>

        <div id="filters">
        <button onclick="setFilter('all')">All</button>
        <button onclick="setFilter('active')">Active</button>
        <button onclick="setFilter('completed')">Completed</button>
        </div>

        <label for="sortTasks">Sort by:</label>

        <select id="sortTasks" onchange="renderTasks()">
            <option value="default">Default</option>
            <option value="priorityHigh">Priority (High → Low)</option>
            <option value="priorityLow">Priority (Low → High)</option>
            <option value="az">A → Z</option>
            <option value="za">Z → A</option>
        </select>
        
        <input type="text" id="searchSkill" placeholder="Search..." oninput="renderTasks()">

        <select id="priority">
            <option value="High">🔴 High</option>
            <option value="Medium" selected>🟡 Medium</option>
            <option value="Low">🟢 Low</option>
        </select>
        
        <input type="text" id="addSkill" placeholder="Enter a skill...">
        <button onclick="addSkill()">Add</button>

        <ul id="skillList"></ul>
    </div>
    
    <script src="script.js"></script>

</body>

</html>
